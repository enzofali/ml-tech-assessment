# Copy to secrets.yaml and fill in real values. secrets.yaml is gitignored.
# Apply with: kubectl apply -f k8s/secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: transcript-secrets
  namespace: transcript-analyzer
type: Opaque
stringData:
  LLM_API_KEY: "your-groq-api-key-here"
  DATABASE_URL: "postgresql://transcript:transcript@postgres:5432/transcript"
  POSTGRES_PASSWORD: "transcript"
