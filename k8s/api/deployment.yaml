apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: transcript-analyzer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: transcript-api:latest
          imagePullPolicy: IfNotPresent  # use locally built image in dev
          ports:
            - containerPort: 8000
          env:
            - name: LLM_PROVIDER
              value: groq
            - name: LLM_MODEL
              value: llama-3.3-70b-versatile
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: transcript-secrets
                  key: LLM_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: transcript-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
