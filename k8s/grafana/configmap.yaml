apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: transcript-analyzer
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true

  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: default
        type: file
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/dashboards
# The dashboard JSON is loaded from a separate ConfigMap created by:
#   kubectl create configmap grafana-dashboard \
#     --from-file=transcript-api.json=grafana/dashboards/transcript-api.json \
#     -n transcript-analyzer
# See Makefile target: make k8s-config
