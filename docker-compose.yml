services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transcript}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transcript}
      POSTGRES_DB: ${POSTGRES_DB:-transcript}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transcript}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://transcript:transcript@postgres:5432/transcript}
      ROOT_PATH: /api  # nginx strips /api before forwarding; FastAPI needs to know
      TRUST_FORWARDED_FOR: "true"  # nginx sets X-Forwarded-For; rate-limit per real client IP
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
      - grafana

  prometheus:
    build: ./prometheus
    environment:
      API_TARGET: ${API_TARGET:-api:8000}  # Railway: <api-service>.railway.internal:8000
    volumes:
      - prometheus_data:/prometheus
    depends_on:
      - api

  grafana:
    build: ./grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost/grafana}
      GF_SERVER_SERVE_FROM_SUB_PATH: ${GF_SERVE_FROM_SUB_PATH:-"true"}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}  # consumed by datasource provisioning
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
